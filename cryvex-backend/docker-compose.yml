version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/cryvex?authSource=admin
      - REDIS_URI=redis://:${REDIS_PASSWORD}@redis:6379/0
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ASSISTANT_OPENROUTER_API_KEY=${ASSISTANT_OPENROUTER_API_KEY}
    env_file:
      - .env
    depends_on:
      - redis
      - mongodb
    networks:
      - cryvex-network
    restart: always

  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - cryvex-network
    restart: always

  mongodb:
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - cryvex-network
    restart: always

networks:
  cryvex-network:
    driver: bridge

volumes:
  redis_data:
  mongo_data:
