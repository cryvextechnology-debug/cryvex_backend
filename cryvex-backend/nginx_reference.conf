# Cryvex Nginx Reference Configuration
# This snippet provides Brotli compression and aggressive Edge Caching for static assets.
# Ensure that the 'brotli' Nginx module is installed and loaded.

http {
    # ── Brotli Compression ──────────────────────────────────────────────
    brotli on;
    brotli_comp_level 4;
    brotli_types text/plain text/css application/javascript application/json image/svg+xml application/xml+rss;
    
    # Enable gzip as fallback for older clients
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name cryvex.in www.cryvex.in;
        root /var/www/cryvex/frontend;

        # ── Edge Strategy & Asset Caching ───────────────────────────────
        # Cache static assets (CSS, JS, Fonts, Images) for 1 year
        location ~* \.(?:css|js|woff2?|eot|ttf|otf|png|jpe?g|gif|webp|avif|ico|svg)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Next-Gen Images Fallback ────────────────────────────────────
        # Pass static pages
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── FastAPI Backend Proxy ───────────────────────────────────────
        location /api/ {
            proxy_pass http://127.0.0.1:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── WebSockets Proxy (Socket.IO) ────────────────────────────────
        location /socket.io/ {
            proxy_pass http://127.0.0.1:8000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
